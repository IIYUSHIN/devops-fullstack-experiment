# ============================================
# Nginx Configuration — Production Server
# ============================================
# This configuration file tells Nginx how to serve our React application.
# Key features:
#   1. Listens on port 8080
#   2. Gzip compression enabled (reduces file sizes by ~70%)
#   3. Static asset caching (browser caches JS/CSS/images for 1 year)
#   4. SPA fallback (all routes redirect to index.html for React Router)

server {
    # ── Port Configuration ──
    # Listen on port 8080 for incoming HTTP requests
    listen 8080;

    # Server name — underscore means "match any hostname"
    server_name _;

    # ── Document Root ──
    # Where the built React files are located (copied from Stage 1)
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ──
    # Compresses responses before sending to the browser
    # This reduces transfer size significantly (e.g., 500KB JS → ~150KB)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ── Static Asset Caching ──
    # Browser caches JS, CSS, images, and fonts for 1 year
    # React adds content hashes to filenames (e.g., main.abc123.js)
    # so when code changes, the filename changes → browser fetches new version
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache media and font files
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback ──
    # React is a Single-Page Application — it uses client-side routing
    # If someone navigates to /about, Nginx won't find an /about file
    # This rule tells Nginx: "If the file doesn't exist, serve index.html"
    # React Router then handles the routing on the client side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security Headers ──
    # Prevent the browser from MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Prevent clickjacking by disabling iframe embedding
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Enable XSS protection in older browsers
    add_header X-XSS-Protection "1; mode=block" always;
    # Control referrer information sent with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Error Pages ──
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
