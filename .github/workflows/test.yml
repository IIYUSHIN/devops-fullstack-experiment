# ============================================
# Pull Request Testing Workflow
# ============================================
# This workflow runs ONLY when a Pull Request is created or updated
# targeting the 'main' branch.
#
# PURPOSE: Run tests before code is merged — acts as a quality gate.
# If tests fail, the PR shows a red ❌ and should not be merged.

name: PR Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🧪 Run Tests on PR
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting (if configured)
        run: npx eslint src/ --ext .js,.jsx || true
        continue-on-error: true

      - name: Run tests
        run: npm test
        env:
          CI: true

      - name: Build check
        run: npm run build
        env:
          CI: true
